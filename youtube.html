<!DOCTYPE html>
<html>

<head>
    <title>YouTube</title>

    <style>


        .video-img {
            width: 300px;
            box-sizing: border-box;
        }

        .video-cantent {
            width: 300px;
            font-size: 15px;
            font-family: Arial;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .video-author {
            font-family: Arial;
            font-size: 15px;
            color: rgb(97, 97, 93);
            margin-bottom: 0;
        }

        .video-stats {
            font-family: Arial;
            font-size: 15px;
            color: rgb(97, 97, 93);
            margin-bottom: 0;
        }


        .video-box {
            display: inline-block;
            margin-right: 10px;
            vertical-align: top;
        }
    </style>

</head>

<body>
    
    <div class="video-box">
        <img class="video-img" src="thumbnail-1.webp" alt="suwret">

            Talking Tech and AI with Google CEO Sundar Pichail
        </p>
        <p class="video-author">Marques Brownlee</p>
        <p class="video-stats">3.4M Views <!--*--> 6 months age</p>
    </div>

    <div class="video-box">
        <img class="video-img" src="thumbnail-1.webp" alt="suwret">

        </p>

</html>
